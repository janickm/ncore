# Unified CI workflow that handles:
# - Build and test (all branches)
# - Documentation deployment to GitHub Pages (main branch only)
# - Python package publishing to Test PyPI (main branch only)
#
# Setup required:
# 1. GitHub Pages: Settings -> Pages -> Source: GitHub Actions
# 2. Test PyPI token: Settings -> Secrets -> TEST_PYPI_API_TOKEN

name: CI

on:
  push:
    branches:
    - main
    tags:
    - '**'
  pull_request:
    branches: ['**']

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to GitHub Pages
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Build and Test - runs on all branches
  # =============================================================================
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel environment
        uses: ./.github/actions/setup-bazel
        with:
          install-pandoc: true
          free-disk-space: true
          github-token: ${{ secrets.NVIDIA_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          bazel-remote-cache: ${{ secrets.BAZEL_REMOTE_CACHE }}
          bazel-remote-cache-header: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
          bazel-remote-cache-upload: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          bazel-bes-backend: ${{ secrets.BAZEL_BES_BACKEND }}
          bazel-bes-results-url: ${{ secrets.BAZEL_BES_RESULTS_URL }}

      - name: Check code format
        run: bazelisk run format.check

      - name: Build / test all targets
        run: |
          bazelisk build ...
          bazelisk test ...

  # =============================================================================
  # Deploy Documentation - runs only on main branch after build-and-test succeeds
  # =============================================================================
  export-docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'NVIDIA/ncore'
    needs: build-and-test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel environment
        uses: ./.github/actions/setup-bazel
        with:
          install-pandoc: true
          free-disk-space: true
          github-token: ${{ secrets.NVIDIA_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          bazel-remote-cache: ${{ secrets.BAZEL_REMOTE_CACHE }}
          bazel-remote-cache-header: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
          bazel-bes-backend: ${{ secrets.BAZEL_BES_BACKEND }}
          bazel-bes-results-url: ${{ secrets.BAZEL_BES_RESULTS_URL }}

      - name: Build documentation
        run: bazelisk build //docs:ncore

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'bazel-bin/docs/ncore_html/'

  deploy-docs:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'NVIDIA/ncore'
    needs: export-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================================
  # Publish to PyPI - runs only on main branch after build-and-test succeeds
  # =============================================================================
  publish-pypi:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && github.repository == 'NVIDIA/ncore'
    needs: build-and-test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bazel environment
        uses: ./.github/actions/setup-bazel
        with:
          install-pandoc: false
          free-disk-space: true
          github-token: ${{ secrets.NVIDIA_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          bazel-remote-cache: ${{ secrets.BAZEL_REMOTE_CACHE }}
          bazel-remote-cache-header: ${{ secrets.BAZEL_REMOTE_CACHE_HEADER }}
          bazel-bes-backend: ${{ secrets.BAZEL_BES_BACKEND }}
          bazel-bes-results-url: ${{ secrets.BAZEL_BES_RESULTS_URL }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: bazelisk run //ncore:ncore_wheel.publish -- --repository pypi --verbose --skip-existing --non-interactive

      - name: Print installation instructions
        run: |
          echo "========================================"
          echo "Python package published to PyPI!"
          echo ""
          echo "To install from PyPI:"
          echo "  pip install nvidia-ncore"
          echo ""
          echo "Note: --extra-index-url is required for dependencies (numpy, torch, etc.)"
          echo ""
          echo "View package: https://pypi.org/project/nvidia-ncore"
          echo "========================================"
