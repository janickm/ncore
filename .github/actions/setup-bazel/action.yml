name: 'Setup Bazel Environment'
description: 'Common setup steps for Bazel-based workflows on Ubuntu runners'

inputs:
  install-pandoc:
    description: 'Whether to install pandoc (required for docs build)'
    required: false
    default: 'false'
  free-disk-space:
    description: 'Whether to free up disk space (needed for large builds with PyTorch)'
    required: false
    default: 'false'
  gpu-enabled:
    description: 'Whether the runner has a GPU. When false (default), GPU tests are skipped via --config=no-gpu.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for package authentication'
    required: true

runs:
  using: 'composite'
  steps:
    # Free up disk space - PyTorch CUDA wheels are ~2GB each
    # Only needed for full builds, not for docs-only or wheel-only builds
    - name: Free disk space
      if: inputs.free-disk-space == 'true'
      shell: bash
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/share/swift "$AGENT_TOOLSDIRECTORY"
        df -h /

    # Setup GitHub Packages authentication for test data downloads
    - name: Setup GitHub Packages auth
      shell: bash
      run: |
        echo "machine maven.pkg.github.com" >> ~/.netrc
        echo "  login ${{ github.actor }}" >> ~/.netrc
        echo "  password ${{ inputs.github-token }}" >> ~/.netrc
        chmod 600 ~/.netrc

    # pandoc is required by nbsphinx to convert Jupyter notebooks
    - name: Install pandoc
      if: inputs.install-pandoc == 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y pandoc

    # Setup Bazel cache - using bazel-contrib/setup-bazel action for simplicity and reliability
    - name: Setup Bazel cache
      uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77
      with:
        # Install bazelisk (not pre-installed on self-hosted runners)
        bazelisk-version: 1.x
        # Avoid downloading Bazel every time
        bazelisk-cache: true
        # Store build cache per workflow
        disk-cache: ${{ github.workflow }}
        # Share repository cache between workflows.
        # The repo contents cache (--repo_contents_cache, enabled by default since Bazel 8.3.0)
        # lives under the repository cache directory, so caching it here also persists
        # cached repo contents (Python interpreters, pip wheels, etc.) across CI runs.
        repository-cache: |
          - MODULE.bazel
          - deps/pip/requirements_3_8.txt
          - deps/pip/requirements_3_11.txt
        # Only save caches on push (not on PRs) to avoid cache pollution
        cache-save: ${{ github.event_name != 'pull_request' }}
        # Bump to force-invalidate all CI caches (e.g. after changing cache structure)
        cache-version: 2
        # Add custom bazelrc options: color / timestamps / conditionally skip GPU tests
        bazelrc: |
            build --color=yes
            build --show_timestamps
            ${{ inputs.gpu-enabled != 'true' && 'test --config=no-gpu' || '' }}
            common --repo_contents_cache=~/.cache/bazel-repo/contents

    # Ensure bazelisk is on PATH for subsequent steps. The setup-bazel action
    # uses core.addPath() which doesn't propagate through composite actions
    # on self-hosted runners. The binary is installed as 'bazel' (not 'bazelisk')
    # under $RUNNER_TOOL_CACHE/bazelisk/<version>/<arch>/.
    - name: Add bazelisk to PATH
      shell: bash
      run: |
        TOOL_CACHE="${RUNNER_TOOL_CACHE:-/home/runner/_work/_tool}"
        BAZEL_BIN=$(find "$TOOL_CACHE/bazelisk" -type f -name "bazel" -executable 2>/dev/null | head -1)
        if [ -n "$BAZEL_BIN" ]; then
          BAZEL_DIR=$(dirname "$BAZEL_BIN")
          echo "Found bazelisk at: $BAZEL_BIN"
          echo "$BAZEL_DIR" >> "$GITHUB_PATH"
          export PATH="$BAZEL_DIR:$PATH"
          # Create 'bazelisk' symlink so both names work
          ln -sf "$BAZEL_BIN" "$BAZEL_DIR/bazelisk"
        fi
        bazelisk version
